name: Docker Build and Push

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      registry_name:
        description: Container registry host
        required: true
        type: string
      registry_username:
        description: Container registry username
        required: true
        type: string
      image_name:
        description: Docker image name
        required: false
        type: string
        default: ""
      docker_context:
        description: Docker build context
        required: false
        type: string
        default: "."
      push_image:
        description: Whether to push the image to the registry
        required: false
        type: boolean
        default: true
      notify_telegram:
        description: Whether to send a Telegram notification
        required: false
        type: boolean
        default: false
    secrets:
      docker_registry_token:
        required: true
      telegram_chat_id:
        required: false
      telegram_bot_token:
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.telegram_bot_token }}
      TELEGRAM_CHAT_ID: ${{ secrets.telegram_chat_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry_name }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.docker_registry_token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          push: ${{ inputs.push_image }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ inputs.registry_name }}/${{ inputs.registry_username }}/${{ inputs.image_name != '' && inputs.image_name || github.event.repository.name }}:latest
            ${{ inputs.registry_name }}/${{ inputs.registry_username }}/${{ inputs.image_name != '' && inputs.image_name || github.event.repository.name }}:${{ github.sha }}

      - name: Notify Telegram
        if: ${{ always() && inputs.notify_telegram == true && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.telegram_chat_id }}
          token: ${{ secrets.telegram_bot_token }}
          format: html
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} *${{ github.repository }}*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            ${{ github.event.head_commit.message }}
